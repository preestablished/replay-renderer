name: ci
on:
  pull_request:
  push:
    branches: [main]
jobs:
  rust:
    strategy:
      matrix:
        # aarch64 leg per M0 acceptance ("cargo build on x86_64 and aarch64").
        # ubuntu-24.04-arm is free for public repos only (see state-scorer's
        # ci.yaml note); if unavailable, record pending CI debt in the
        # resolution note (06-resolution.md) — do not silently drop it.
        runner: [ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          path: repo
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/control-plane
          path: control-plane
      - uses: dtolnay/rust-toolchain@stable
      # M3's fallback lane: libx264 + ffprobe must exist in CI.
      # ffmpeg is needed on the Spark only for NVENC; CI exercises libx264.
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - run: cargo fmt --all -- --check
        working-directory: repo
      - run: cargo clippy --workspace --all-targets -- -D warnings
        working-directory: repo
      - run: cargo build --workspace
        working-directory: repo
      - run: cargo test --workspace
        working-directory: repo
      # The workspace run never enables the mock feature — the M2 suite
      # would silently never run in CI without this explicit step.
      - run: cargo test -p replay-verify --features mock
        working-directory: repo
      - run: cargo run -p xtask -- regen-fixtures --check
        working-directory: repo

  # Short fuzz smoke over the two replay-splice targets (M1 accept-when).
  # state-scorer's fuzz-smoke job is the template.
  fuzz-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: repo
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/control-plane
          path: control-plane
      - uses: dtolnay/rust-toolchain@nightly
      - run: cargo install cargo-fuzz --locked
      - run: cargo +nightly fuzz run dilog_reader -- -max_total_time=90
        working-directory: repo
      - run: cargo +nightly fuzz run dhilog_validator -- -max_total_time=90
        working-directory: repo
